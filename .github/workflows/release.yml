name: Build and Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release
        run: |
          xcodebuild -scheme NekoLink -configuration Release \
            -derivedDataPath build

      - name: Package
        run: |
          cd build/Products/Release
          ditto -c -k --keepParent NekoLink.app NekoLink-${{ github.ref_name }}.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Products/Release/NekoLink-*.zip